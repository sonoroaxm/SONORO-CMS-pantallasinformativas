<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONORO — Display de Turnos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ══════════════════════════════════════════════
     VARIABLES DE TEMA
     Valores aplicados por JS en applyConfig()
     Las reglas CSS son fallback inicial.
  ══════════════════════════════════════════════ */
  :root {
    --brand: #FF1B8D;
  }

  body.theme-dark {
    --bg:          #080808;
    --text:        #ffffff;
    --text-muted:  #aaaaaa;
    --card-bg:     #383838;
    --card-border: rgba(255,255,255,0.14);
    --card-shadow: 0 4px 20px rgba(0,0,0,0.60);
    --lt-bg:       #0d0d0d;
    --lt-border:   rgba(255,255,255,0.08);
    --logo-bg:     #242424;
    --logo-border: rgba(255,255,255,0.14);
    --ov-bg:       rgba(6,6,6,0.97);
    --ov-text:     #ffffff;
    --ov-muted:    #888888;
    --ov-sep:      rgba(255,255,255,0.12);
    --logo-col:    rgba(255,255,255,0.90);
  }

  body.theme-light {
    --bg:          #f2f2f2;
    --text:        #0d0d0d;
    --text-muted:  #606060;
    --card-bg:     #ffffff;
    --card-border: rgba(0,0,0,0.07);
    --card-shadow: 0 4px 16px rgba(0,0,0,0.10);
    --lt-bg:       #e0e0e0;
    --lt-border:   rgba(0,0,0,0.08);
    --logo-bg:     #d0d0d0;
    --logo-border: rgba(0,0,0,0.10);
    --ov-bg:       rgba(246,246,246,0.98);
    --ov-text:     #0d0d0d;
    --ov-muted:    #555555;
    --ov-sep:      rgba(0,0,0,0.10);
    --logo-col:    rgba(0,0,0,0.80);
  }

  body {
    background: var(--bg);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  /* ══════════════════════════════════════════════
     CAPA 1 — Signage background (z: 0)
  ══════════════════════════════════════════════ */
  #signage-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: var(--bg);
  }
  #bg-video,
  #bg-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #bg-image { display: none; }

  /* ══════════════════════════════════════════════
     CAPA 2 — Lower third (z: 10)
     Layout: [LOGO] [SLOT][SLOT][SLOT][SLOT]
     Siempre visible. Muestra tickets en atención
     y los próximos en espera.
  ══════════════════════════════════════════════ */
  #lower-third {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 213px;
    z-index: 10;
    display: flex;
    align-items: stretch;
    border-top: 3px solid var(--brand);
  }

  /* ── Bloque izquierdo: solo logo del cliente ── */
  #lt-logo-block {
    width: 246px;
    flex-shrink: 0;
    background: var(--logo-bg);
    border-right: 1px solid var(--logo-border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 22px;
  }
  #lt-logo-img {
    max-width: 88%;
    max-height: 72%;
    object-fit: contain;
    display: none;
  }
  /* Fallback cuando no hay logo configurado */
  #lt-logo-fallback {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--brand);
    text-align: center;
    line-height: 1.25;
    opacity: 0.85;
  }

  /* ── Área de 4 slots de tickets ── */
  #lt-tickets-area {
    flex: 1;
    background: var(--lt-bg);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px 14px;
    overflow: hidden;
    align-items: stretch;
  }

  /* Cada slot: tarjeta redondeada con fondo propio */
  .lt-slot {
    display: flex;
    align-items: center;
    padding: 0 26px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }

  /* Acento de color en borde superior de cada slot activo */
  .lt-slot.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 20px 20px 0 0;
    background: var(--slot-color, var(--brand));
  }

  /* Slot vacío */
  .lt-slot.empty {
    justify-content: center;
    background: var(--card-bg);
    opacity: 0.45;
  }
  .lt-empty-dash {
    font-size: 28px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Slot en espera — levemente atenuado */
  .lt-slot.waiting {
    opacity: 0.70;
    border-style: dashed;
  }

  /* Contenido del ticket dentro de cada slot */
  .lt-ticket-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    animation: slideUp 0.28s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lt-num {
    font-size: 82px;
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .lt-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    min-width: 0;
  }
  .lt-svc {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lt-ctr {
    font-size: 17px;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lt-status {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.80;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* ══════════════════════════════════════════════
     CAPA 3 — Overlay fullscreen al llamar turno
     (z: 100). Número gigante + servicio legible.
  ══════════════════════════════════════════════ */
  #call-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--ov-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    pointer-events: none;
    opacity: 0;
    transform: scale(1.012);
    transition: opacity 0.32s ease, transform 0.32s ease;
  }
  #call-overlay.visible {
    opacity: 1;
    transform: scale(1);
  }

  .ov-eyebrow {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--ov-muted);
  }

  /* Número: calibrado para 403px en pantalla 1920px → ~21vw */
  .ov-number {
    font-size: clamp(200px, 22vw, 420px);
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -6px;
    color: var(--brand);
    animation: popIn 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .ov-sep {
    width: 80px;
    height: 2px;
    background: var(--ov-sep);
    border-radius: 1px;
  }

  /* Servicio: máximo visible — llena buena parte del ancho */
  .ov-service {
    font-size: clamp(60px, 8vw, 160px);
    font-weight: 800;
    color: var(--ov-text);
    text-align: center;
    max-width: 88vw;
    line-height: 1.05;
  }

  /* Ventanilla: grande y legible */
  .ov-counter {
    font-size: clamp(36px, 4.8vw, 92px);
    font-weight: 500;
    color: var(--ov-muted);
    text-align: center;
  }

  .ov-priority {
    display: none;
    background: var(--brand);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 28px;
    border-radius: 28px;
    margin-top: 4px;
  }
  .ov-priority.show { display: block; }

  /* Barra de progreso de duración */
  .ov-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 5px;
    background: var(--brand);
    width: 100%;
    transform-origin: left;
    opacity: 0.55;
  }
  #call-overlay.visible .ov-progress {
    animation: shrinkBar var(--overlay-duration, 7s) linear forwards;
  }

  /* ══════════════════════════════════════════════
     ANIMACIONES
  ══════════════════════════════════════════════ */
  @keyframes popIn {
    0%   { transform: scale(0.72); opacity: 0; }
    68%  { transform: scale(1.06); }
    100% { transform: scale(1);    opacity: 1; }
  }
  @keyframes shrinkBar {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
</style>
</head>
<body class="theme-dark">

<!-- CAPA 1: Signage background -->
<div id="signage-bg">
  <video id="bg-video" muted playsinline autoplay></video>
  <img   id="bg-image" alt="">
</div>

<!-- CAPA 2: Lower third -->
<div id="lower-third">

  <!-- Bloque izquierdo: logo del cliente -->
  <div id="lt-logo-block">
    <img  id="lt-logo-img" alt="">
    <div  id="lt-logo-fallback">SONORO.</div>
  </div>

  <!-- 4 slots de tickets (grid) -->
  <div id="lt-tickets-area">
    <div class="lt-slot empty" id="lt-slot-0"><span class="lt-empty-dash">—</span></div>
    <div class="lt-slot empty" id="lt-slot-1"><span class="lt-empty-dash">—</span></div>
    <div class="lt-slot empty" id="lt-slot-2"><span class="lt-empty-dash">—</span></div>
    <div class="lt-slot empty" id="lt-slot-3"><span class="lt-empty-dash">—</span></div>
  </div>

</div>

<!-- CAPA 3: Overlay al llamar turno -->
<div id="call-overlay">
  <span class="ov-eyebrow">Turno llamado</span>
  <div  class="ov-number"   id="ov-number"></div>
  <div  class="ov-sep"></div>
  <div  class="ov-service"  id="ov-service"></div>
  <div  class="ov-counter"  id="ov-counter"></div>
  <div  class="ov-priority" id="ov-priority">Prioritario</div>
  <div  class="ov-progress"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── Parámetros desde URL ─────────────────────────────────────
  const params    = new URLSearchParams(location.search);
  const DEVICE_ID = params.get('device');
  const BRANCH_ID = params.get('branch');
  const API_URL   = window.location.origin;
  const OVERLAY_DURATION_MS = 17000;

  // Config visual — defaults sobrescritos por API
  let CONFIG = {
    theme:       params.get('theme') || 'dark',
    brand_color: params.get('brand') || '#FF1B8D',
    logo_url:    params.get('logo')  || null,
    branch_name: params.get('name')  || '',
  };

  // ── DOM refs ─────────────────────────────────────────────────
  const bgVideo    = document.getElementById('bg-video');
  const bgImage    = document.getElementById('bg-image');
  const overlay    = document.getElementById('call-overlay');
  const ovNumber   = document.getElementById('ov-number');
  const ovService  = document.getElementById('ov-service');
  const ovCounter  = document.getElementById('ov-counter');
  const ovPriority = document.getElementById('ov-priority');
  const ltLogoImg  = document.getElementById('lt-logo-img');
  const ltLogoFb   = document.getElementById('lt-logo-fallback');

  // ── Aplicar config visual ─────────────────────────────────────
  function applyConfig(cfg) {
    CONFIG = { ...CONFIG, ...cfg };
    const isLight = CONFIG.theme === 'light';

    // Clase de tema en body
    document.body.className = isLight ? 'theme-light' : 'theme-dark';

    // Seteo explícito en :root — fuerza repaint en Chromium con backdrop-filter
    const root = document.documentElement;
    if (isLight) {
      root.style.setProperty('--bg',          '#f2f2f2');
      root.style.setProperty('--text',        '#0d0d0d');
      root.style.setProperty('--text-muted',  '#606060');
      root.style.setProperty('--card-bg',     '#ffffff');
      root.style.setProperty('--card-border', 'rgba(0,0,0,0.07)');
      root.style.setProperty('--card-shadow', '0 4px 16px rgba(0,0,0,0.10)');
      root.style.setProperty('--lt-bg',       '#e0e0e0');
      root.style.setProperty('--lt-border',   'rgba(0,0,0,0.08)');
      root.style.setProperty('--logo-bg',     '#d0d0d0');
      root.style.setProperty('--logo-border', 'rgba(0,0,0,0.10)');
      root.style.setProperty('--ov-bg',       'rgba(246,246,246,0.98)');
      root.style.setProperty('--ov-text',     '#0d0d0d');
      root.style.setProperty('--ov-muted',    '#555555');
      root.style.setProperty('--ov-sep',      'rgba(0,0,0,0.10)');
      root.style.setProperty('--logo-col',    'rgba(0,0,0,0.80)');
    } else {
      root.style.setProperty('--bg',          '#080808');
      root.style.setProperty('--text',        '#ffffff');
      root.style.setProperty('--text-muted',  '#aaaaaa');
      root.style.setProperty('--card-bg',     '#383838');
      root.style.setProperty('--card-border', 'rgba(255,255,255,0.14)');
      root.style.setProperty('--card-shadow', '0 4px 20px rgba(0,0,0,0.60)');
      root.style.setProperty('--lt-bg',       '#0d0d0d');
      root.style.setProperty('--lt-border',   'rgba(255,255,255,0.08)');
      root.style.setProperty('--logo-bg',     '#242424');
      root.style.setProperty('--logo-border', 'rgba(255,255,255,0.14)');
      root.style.setProperty('--ov-bg',       'rgba(6,6,6,0.97)');
      root.style.setProperty('--ov-text',     '#ffffff');
      root.style.setProperty('--ov-muted',    '#888888');
      root.style.setProperty('--ov-sep',      'rgba(255,255,255,0.12)');
      root.style.setProperty('--logo-col',    'rgba(255,255,255,0.90)');
    }

    // Color de marca
    root.style.setProperty('--brand', CONFIG.brand_color || '#FF1B8D');

    // Logo del cliente
    if (CONFIG.logo_url) {
      ltLogoImg.src            = CONFIG.logo_url;
      ltLogoImg.style.display  = 'block';
      ltLogoFb.style.display   = 'none';
    } else {
      ltLogoImg.style.display  = 'none';
      ltLogoFb.style.display   = 'block';
      // Si hay nombre de sucursal configurado úsarlo como fallback, si no SONORO.
      ltLogoFb.textContent     = CONFIG.branch_name || 'SONORO.';
    }
  }

  // ── Cargar config de sucursal desde API ────────────────────
  async function loadBranchConfig() {
    if (!BRANCH_ID) return;
    try {
      const res = await fetch(`${API_URL}/api/queue/branches/${BRANCH_ID}/display-config`);
      if (!res.ok) return;
      applyConfig(await res.json());
    } catch(e) {}
  }

  // ── Estado ───────────────────────────────────────────────────
  let playlistItems = [];
  let currentIdx    = 0;
  let imageTimer    = null;
  let overlayTimer  = null;
  let lastTokenId   = null;
  // Cola de tickets mostrados en lower third: array de 4 posiciones
  let ltSlots = [null, null, null, null];

  // ── Socket.io ─────────────────────────────────────────────────
  const socket = io(API_URL, {
    transports: ['websocket', 'polling'],
    reconnectionDelayMax: 10000,
  });

  socket.on('connect', () => {
    if (BRANCH_ID) socket.emit('join_branch', BRANCH_ID);
  });

  // Display sincronizado con audio: el RPi emite token_now_playing
  // exactamente cuando el audio va a sonar -> cero desfase.
  socket.on('token_now_playing', (data) => {
    lastTokenId = data.token_id;
    showCallOverlay(data);
    refreshLowerThird();
  });



  socket.on('token_finished',    () => { refreshLowerThird(); });
  socket.on('new_token',         () => { refreshLowerThird(); });
  socket.on('token_transferred', () => { refreshLowerThird(); });

  socket.on('branch_config_updated', (data) => {
    if (data.branch_id == BRANCH_ID) loadBranchConfig();
  });

  // ── Overlay fullscreen ──────────────────────────────────────
  function showCallOverlay(data) {
    ovNumber.textContent  = data.token_number || '';
    ovService.textContent = data.service_name  || '';
    ovCounter.textContent = data.counter_name  || '';
    ovPriority.classList.toggle('show', !!data.is_priority);

    overlay.style.setProperty('--overlay-duration', `${OVERLAY_DURATION_MS / 1000}s`);
    overlay.classList.remove('visible');
    void overlay.offsetWidth;
    overlay.classList.add('visible');

    if (overlayTimer) clearTimeout(overlayTimer);
    overlayTimer = setTimeout(() => overlay.classList.remove('visible'), OVERLAY_DURATION_MS);

    // Audio manejado por el RPi via Piper TTS (sync-app.js)
  }

  // ── Lower third: fetch + render ─────────────────────────────
  async function refreshLowerThird() {
    if (!BRANCH_ID) return;
    try {
      const [activeRes, waitingRes] = await Promise.allSettled([
        fetch(`${API_URL}/api/queue/branches/${BRANCH_ID}/active`),
        fetch(`${API_URL}/api/queue/branches/${BRANCH_ID}/queue?status=waiting`)
      ]);

      const active  = (activeRes.status  === 'fulfilled' && activeRes.value.ok)
        ? await activeRes.value.json()  : [];
      const waiting = (waitingRes.status === 'fulfilled' && waitingRes.value.ok)
        ? await waitingRes.value.json() : [];

      renderSlots(active, waiting);
    } catch(e) {}
  }

  function renderSlots(active, waiting) {
    // Llenar los 4 slots: primero activos, luego en espera, el resto vacío
    const items = [
      ...(active  || []).slice(0, 4).map(t => ({ ...t, _type: 'active'  })),
      ...(waiting || []).slice(0, 4).map(t => ({ ...t, _type: 'waiting' })),
    ].slice(0, 4);

    for (let i = 0; i < 4; i++) {
      const slot = document.getElementById('lt-slot-' + i);
      const t    = items[i];

      if (!t) {
        slot.className = 'lt-slot empty';
        slot.style.removeProperty('--slot-color');
        slot.innerHTML = '<span class="lt-empty-dash">—</span>';
        continue;
      }

      const color  = t.service_color || CONFIG.brand_color;
      const num    = t.token_number || t.display_number || '';
      const svc    = t.service_name  || '';
      const ctr    = t.counter_name  || '';
      const status = t._type === 'active' ? 'En atención' : 'En espera';

      slot.className = `lt-slot ${t._type}`;
      slot.style.setProperty('--slot-color', t._type === 'active' ? color : 'transparent');
      slot.innerHTML = `
        <div class="lt-ticket-inner">
          <span class="lt-num" style="color:${color}">${num}</span>
          <div class="lt-info">
            <span class="lt-svc">${svc}</span>
            ${ctr ? `<span class="lt-ctr">${ctr}</span>` : ''}
            <span class="lt-status" style="color:${t._type === 'active' ? color : 'var(--text-muted)'}">
              ${status}
            </span>
          </div>
        </div>`;
    }
  }

  // ── Playlist signage ─────────────────────────────────────────
  async function loadPlaylist() {
    if (!DEVICE_ID) return;
    try {
      const res = await fetch(`${API_URL}/api/devices/${DEVICE_ID}/manifest`);
      if (!res.ok) { setTimeout(loadPlaylist, 15000); return; }
      playlistItems = (await res.json()).assets || [];
      if (playlistItems.length) { currentIdx = 0; playNext(); }
    } catch(e) { setTimeout(loadPlaylist, 15000); }
  }

  function playNext() {
    if (!playlistItems.length) return;
    if (imageTimer) { clearTimeout(imageTimer); imageTimer = null; }
    const item    = playlistItems[currentIdx % playlistItems.length];
    currentIdx++;
    const fileUrl = `${API_URL}/uploads/${encodeURIComponent(item.filename)}`;
    if (item.type === 'video') {
      bgImage.style.display = 'none';
      bgVideo.style.display = 'block';
      bgVideo.src     = fileUrl;
      bgVideo.onended = playNext;
      bgVideo.onerror = () => playNext();
      bgVideo.play().catch(() => {});
    } else {
      bgVideo.style.display = 'none';
      bgVideo.pause();
      bgImage.style.display = 'block';
      bgImage.src    = fileUrl;
      bgImage.onerror = () => playNext();
      imageTimer = setTimeout(playNext, item.duration || 10000);
    }
  }

  async function syncPlaylist() {
    if (!DEVICE_ID) return;
    try {
      const res      = await fetch(`${API_URL}/api/devices/${DEVICE_ID}/manifest`);
      if (!res.ok) return;
      const newItems = (await res.json()).assets || [];
      const newKey   = newItems.map(i => i.filename).join(',');
      const curKey   = playlistItems.map(i => i.filename).join(',');
      if (newKey !== curKey) {
        playlistItems = newItems;
        currentIdx    = currentIdx % (newItems.length || 1);
      }
    } catch(e) {}
  }

  // ── Init ─────────────────────────────────────────────────────
  applyConfig(CONFIG);
  loadBranchConfig();
  loadPlaylist();
  refreshLowerThird();

  setInterval(refreshLowerThird,  10 * 1000);
  setInterval(syncPlaylist,        5 * 60 * 1000);
  setInterval(loadBranchConfig,   60 * 1000);
</script>
</body>
</html>
