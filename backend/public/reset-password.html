<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONORO. CMS — Restablecer contraseña</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:    #00f5d4;
      --violet:  #7b61ff;
      --black:   #0a0a0f;
      --surface: #111118;
      --surface2:#18181f;
      --border:  #1e1e2e;
      --text:    #e8e8f0;
      --text-muted: #555570;
      --grad:    linear-gradient(135deg, var(--violet) 0%, var(--cyan) 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; }
    .screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .wrap { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; padding: 20px; }
    .logo { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 4px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sub { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 32px; }
    .card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-top { height: 3px; background: var(--grad); }
    .card-body { padding: 32px; }
    .card-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .card-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 7px; color: var(--text-muted); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,245,212,0.08); }
    .form-group input::placeholder { color: var(--text-muted); }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .submit-btn { width: 100%; padding: 13px; background: var(--grad); color: white; border: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-bottom: 16px; font-size: 13px; border-radius: 8px; padding: 10px 14px; display: none; }
    #status.error   { display: block; background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.25); color: #ff4d6d; }
    #status.success { display: block; background: rgba(0,245,212,0.08); border: 1px solid rgba(0,245,212,0.2); color: var(--cyan); }
    .back-link { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); }
    .back-link a { color: var(--cyan); text-decoration: none; font-weight: 600; }
    .back-link a:hover { opacity: 0.7; }
    #expired-msg { text-align: center; }
    #expired-msg p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="screen">
  <div class="wrap">
    <div class="logo">SONORO.</div>
    <div class="sub">CMS &nbsp;·&nbsp; Restablecer contraseña</div>
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div id="status"></div>

        <div id="form-section">
          <div class="card-title">Nueva contraseña</div>
          <div class="card-desc">Ingresa tu nueva contraseña. Debe tener al menos 8 caracteres.</div>
          <form id="resetForm" onsubmit="doReset(event)">
            <div class="form-group">
              <label>Nueva contraseña</label>
              <input type="password" id="newPassword" placeholder="••••••••" minlength="8" required>
            </div>
            <div class="form-group">
              <label>Confirmar contraseña</label>
              <input type="password" id="confirmPassword" placeholder="••••••••" minlength="8" required>
              <div class="hint">Mínimo 8 caracteres</div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Actualizar contraseña</button>
          </form>
        </div>

        <div id="expired-msg" style="display:none;">
          <p>Este enlace es inválido o ya expiró.<br>Solicita un nuevo enlace desde la pantalla de inicio de sesión.</p>
          <a href="/dashboard.html" class="submit-btn" style="display:block;text-align:center;text-decoration:none;">Volver al inicio</a>
        </div>
      </div>
    </div>
    <div class="back-link"><a href="/dashboard.html">Volver al inicio de sesion</a></div>
  </div>
</div>
<script>
  const API_URL = window.location.origin;
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('expired-msg').style.display = 'block';
  }

  async function doReset(e) {
    e.preventDefault();
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('confirmPassword').value;
    if (password !== confirm) { showStatus('Las contraseñas no coinciden', 'error'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Actualizando...';
    hideStatus();
    try {
      const res = await fetch(`${API_URL}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showStatus(data.error || 'Error al actualizar', 'error');
        if (data.error && (data.error.includes('expirado') || data.error.includes('inválido'))) {
          setTimeout(() => {
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('expired-msg').style.display = 'block';
            hideStatus();
          }, 2000);
        }
        return;
      }
      showStatus('Contraseña actualizada. Redirigiendo...', 'success');
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => window.location.href = '/dashboard.html', 2000);
    } catch (err) {
      showStatus('Error de conexion con el servidor', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Actualizar contraseña';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg; el.className = type;
  }
  function hideStatus() {
    const el = document.getElementById('status');
    el.className = ''; el.style.display = 'none';
  }
</script>
</body>
</html>
