<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONORO. CMS — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:    #00f5d4;
      --cyan2:   #00c4aa;
      --violet:  #7b61ff;
      --black:   #0a0a0f;
      --surface: #111118;
      --surface2:#18181f;
      --surface3:#1e1e28;
      --border:  #1e1e2e;
      --text:    #e8e8f0;
      --text-muted: #555570;
      --grad:    linear-gradient(135deg, var(--violet) 0%, var(--cyan) 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; font-weight: 400; }
    .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--black); }
    .login-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; padding: 20px; }
    .login-logo { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 4px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-sub { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 32px; text-align: center; }
    .login-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .login-card-top { height: 3px; background: var(--grad); }
    .login-card-body { padding: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 7px; color: var(--text-muted); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,245,212,0.08); }
    .form-group input::placeholder { color: var(--text-muted); }
    .submit-btn { width: 100%; padding: 13px; background: var(--grad); color: white; border: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #authStatus { margin-bottom: 16px; font-size: 13px; border-radius: 8px; padding: 10px 14px; display: none; }
    #authStatus.error { display: block; background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.25); color: #ff4d6d; }
    #authStatus.success { display: block; background: rgba(0,245,212,0.08); border: 1px solid rgba(0,245,212,0.2); color: var(--cyan); }
    .admin-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,245,212,0.06); border: 1px solid rgba(0,245,212,0.15); border-radius: 20px; padding: 4px 12px; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan); margin-bottom: 24px; }
    .admin-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .client-link { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); }
    .client-link a { color: var(--cyan); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
    .client-link a:hover { opacity: 0.7; }
  </style>
</head>
<body>
<div class="login-screen">
  <div class="login-wrap">
    <div class="login-logo">SONORO.</div>
    <div class="login-sub">CMS &nbsp;·&nbsp; Panel Administrativo</div>
    <div class="login-card">
      <div class="login-card-top"></div>
      <div class="login-card-body">
        <div class="admin-badge">Acceso administrador</div>
        <div id="authStatus"></div>
        <form id="loginForm" onsubmit="doLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@sonoro.com.co" required>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">Ingresar</button>
        </form>
      </div>
    </div>
    <div class="client-link">¿Eres cliente? <a href="/dashboard.html">Ir al dashboard →</a></div>
  </div>
</div>
<script>
  const API_URL = window.location.origin;
  const existingToken = localStorage.getItem('authToken');
  if (existingToken) {
    fetch(`${API_URL}/api/license/status`, { headers: { 'Authorization': `Bearer ${existingToken}` } })
      .then(r => r.json()).then(data => { if (data.role === 'admin') window.location.href = '/admin.html'; }).catch(() => {});
  }
  async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Verificando...';
    document.getElementById('authStatus').style.display = 'none';
    try {
      const res = await fetch(`${API_URL}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok || !data.token) { showStatus('Email o contraseña incorrectos', 'error'); return; }
      const profileRes = await fetch(`${API_URL}/api/license/status`, { headers: { 'Authorization': `Bearer ${data.token}` } });
      const profile = await profileRes.json();
      if (profile.role !== 'admin') { showStatus('Acceso denegado — esta área es solo para administradores', 'error'); return; }
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('userEmail', data.user.email);
      localStorage.setItem('userName', data.user.name);
      showStatus('Acceso concedido, redirigiendo...', 'success');
      setTimeout(() => window.location.href = '/admin.html', 800);
    } catch (err) {
      showStatus('Error de conexión con el servidor', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  }
  function showStatus(msg, type) {
    const el = document.getElementById('authStatus');
    el.textContent = msg; el.className = type; el.style.display = 'block';
  }
</script>
</body>
</html>
